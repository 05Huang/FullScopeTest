name: CI and Deploy

on:
  push:
    branches: ["main"]

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"
          cache-dependency-path: web/package-lock.json

      - name: Build frontend
        working-directory: web
        run: |
          npm ci
          npm run build

      - name: Pack dist
        run: |
          tar -czf dist.tgz -C web/dist .

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: dist.tgz

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Backend tests (sqlite)
        working-directory: backend
        env:
          FLASK_ENV: testing
          CELERY_ENABLE: "false"
          TEST_DATABASE_URL: "sqlite:////tmp/fullscopetest_test.db"
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-test.txt
          pytest -q tests

  deploy:
    needs: [ci]
    runs-on: ubuntu-latest
    steps:
      - name: Download dist artifact
        uses: actions/download-artifact@v4
        with:
          name: web-dist

      - name: Setup SSH
        shell: bash
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_KEY }}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          ssh-keyscan -H "${{ secrets.SSH_HOST }}" >> ~/.ssh/known_hosts
          cat > ~/.ssh/config <<EOF
          Host deploy-target
            HostName ${{ secrets.SSH_HOST }}
            User ${{ secrets.SSH_USER }}
            IdentityFile ~/.ssh/id_ed25519
            ConnectTimeout 15
            ServerAliveInterval 30
            ServerAliveCountMax 6
            TCPKeepAlive yes
            BatchMode yes
            StrictHostKeyChecking yes
          EOF
          chmod 600 ~/.ssh/config

      - name: Upload dist to server
        shell: bash
        run: |
          for i in 1 2 3; do
            scp dist.tgz deploy-target:/tmp/fullscopetest-dist.tgz && break
            if [ "$i" -eq 3 ]; then exit 1; fi
            sleep 5
          done

      - name: Deploy backend on server (run deploy.sh)
        shell: bash
        run: |
          for i in 1 2 3; do
            ssh deploy-target "\
            set -e; \
            cd '${{ secrets.DEPLOY_DIR }}'; \
            SKIP_WEB_BUILD=1 BRANCH=main ./deploy.sh \
            " && break
            if [ "$i" -eq 3 ]; then exit 1; fi
            sleep 5
          done

      - name: Publish frontend to 1Panel site dir
        shell: bash
        run: |
          for i in 1 2 3; do
            ssh deploy-target "\
            set -e; \
            SITE_DIR='${{ secrets.SITE_DIR }}'; \
            TMP_DIR=\"\$(mktemp -d)\"; \
            tar -xzf /tmp/fullscopetest-dist.tgz -C \"\$TMP_DIR\" --no-same-owner --no-same-permissions -m; \
            mkdir -p \"\$SITE_DIR\"; \
            find \"\$SITE_DIR\" -mindepth 1 -maxdepth 1 -exec rm -rf {} +; \
            cp -R \"\$TMP_DIR\"/. \"\$SITE_DIR\"/; \
            rm -rf \"\$TMP_DIR\"; \
            " && break
            if [ "$i" -eq 3 ]; then exit 1; fi
            sleep 5
          done

      - name: Health check
        shell: bash
        run: |
          for i in 1 2 3; do
            ssh deploy-target "\
            curl -fsS http://127.0.0.1:5211/api/v1/api-test/health >/dev/null \
            " && break
            if [ "$i" -eq 3 ]; then exit 1; fi
            sleep 5
          done
