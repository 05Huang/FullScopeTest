# FullScopeTest production Docker Compose (OpenResty on host, services in Docker)

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save "" --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fullscopetest_network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: always
    ports:
      - "127.0.0.1:5211:5000"
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_ENABLE=true
      - CELERY_BROKER_URL=${REDIS_URL}
      - CELERY_RESULT_BACKEND=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OSS_ENDPOINT=${OSS_ENDPOINT}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME}
      - OSS_DOMAIN=${OSS_DOMAIN}
      - AI_ASSISTANT_ENABLED=${AI_ASSISTANT_ENABLED}
      - AI_ASSISTANT_BASE_URL=${AI_ASSISTANT_BASE_URL}
      - AI_ASSISTANT_MODEL=${AI_ASSISTANT_MODEL}
      - AI_ASSISTANT_API_KEY=${AI_ASSISTANT_API_KEY}
      - AI_VISION_BASE_URL=${AI_VISION_BASE_URL}
      - AI_VISION_MODEL=${AI_VISION_MODEL}
      - AI_VISION_API_KEY=${AI_VISION_API_KEY}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_URL=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_URL}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TOKEN=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TOKEN}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TIMEOUT=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TIMEOUT}
      - AI_EXPLORE_LIVE_VIEW_INTERNAL_URL_TEMPLATE=${AI_EXPLORE_LIVE_VIEW_INTERNAL_URL_TEMPLATE}
      - AI_EXPLORE_LIVE_VIEW_URL_TEMPLATE=${AI_EXPLORE_LIVE_VIEW_URL_TEMPLATE}
      - AI_EXPLORE_LIVE_VIEW_RELEASE_URL=${AI_EXPLORE_LIVE_VIEW_RELEASE_URL}
      - AI_EXPLORE_LIVE_VIEW_RELEASE_TIMEOUT=${AI_EXPLORE_LIVE_VIEW_RELEASE_TIMEOUT}
      - AI_EXPLORE_BROWSER_HEADLESS=${AI_EXPLORE_BROWSER_HEADLESS}
      - AI_EXPLORE_BROWSER_SLOW_MO=${AI_EXPLORE_BROWSER_SLOW_MO}
    volumes:
      - backend_uploads:/app/uploads
      - backend_reports:/app/reports
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fullscopetest_network

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: always
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_ENABLE=true
      - CELERY_BROKER_URL=${REDIS_URL}
      - CELERY_RESULT_BACKEND=${REDIS_URL}
      - OSS_ENDPOINT=${OSS_ENDPOINT}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME}
      - OSS_DOMAIN=${OSS_DOMAIN}
      - AI_ASSISTANT_ENABLED=${AI_ASSISTANT_ENABLED}
      - AI_ASSISTANT_BASE_URL=${AI_ASSISTANT_BASE_URL}
      - AI_ASSISTANT_MODEL=${AI_ASSISTANT_MODEL}
      - AI_ASSISTANT_API_KEY=${AI_ASSISTANT_API_KEY}
      - AI_VISION_BASE_URL=${AI_VISION_BASE_URL}
      - AI_VISION_MODEL=${AI_VISION_MODEL}
      - AI_VISION_API_KEY=${AI_VISION_API_KEY}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_URL=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_URL}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TOKEN=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TOKEN}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TIMEOUT=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TIMEOUT}
      - AI_EXPLORE_LIVE_VIEW_INTERNAL_URL_TEMPLATE=${AI_EXPLORE_LIVE_VIEW_INTERNAL_URL_TEMPLATE}
      - AI_EXPLORE_LIVE_VIEW_URL_TEMPLATE=${AI_EXPLORE_LIVE_VIEW_URL_TEMPLATE}
      - AI_EXPLORE_LIVE_VIEW_RELEASE_URL=${AI_EXPLORE_LIVE_VIEW_RELEASE_URL}
      - AI_EXPLORE_LIVE_VIEW_RELEASE_TIMEOUT=${AI_EXPLORE_LIVE_VIEW_RELEASE_TIMEOUT}
      - AI_EXPLORE_BROWSER_HEADLESS=${AI_EXPLORE_BROWSER_HEADLESS}
      - AI_EXPLORE_BROWSER_SLOW_MO=${AI_EXPLORE_BROWSER_SLOW_MO}
    volumes:
      - backend_reports:/app/reports
    depends_on:
      - redis
    command: celery -A app.tasks worker --loglevel=warning
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fullscopetest_network

networks:
  fullscopetest_network:
    driver: bridge

volumes:
  redis_data:
  backend_uploads:
  backend_reports:
