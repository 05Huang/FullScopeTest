# FullScopeTest production Docker Compose (OpenResty on host, services in Docker)

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --save "" --appendonly no
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fullscopetest_network

  backend:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: always
    ports:
      - "127.0.0.1:5211:5000"
      - "127.0.0.1:6080:6080"
    environment:
      - FLASK_ENV=production
      - DISPLAY=:99
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_ENABLE=true
      - CELERY_BROKER_URL=${REDIS_URL}
      - CELERY_RESULT_BACKEND=${REDIS_URL}
      - SECRET_KEY=${SECRET_KEY}
      - JWT_SECRET_KEY=${JWT_SECRET_KEY}
      - OSS_ENDPOINT=${OSS_ENDPOINT}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME}
      - OSS_DOMAIN=${OSS_DOMAIN}
      - AI_ASSISTANT_ENABLED=${AI_ASSISTANT_ENABLED}
      - AI_ASSISTANT_BASE_URL=${AI_ASSISTANT_BASE_URL}
      - AI_ASSISTANT_MODEL=${AI_ASSISTANT_MODEL}
      - AI_ASSISTANT_API_KEY=${AI_ASSISTANT_API_KEY}
      - AI_VISION_BASE_URL=${AI_VISION_BASE_URL}
      - AI_VISION_MODEL=${AI_VISION_MODEL}
      - AI_VISION_API_KEY=${AI_VISION_API_KEY}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_URL=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_URL:-}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TOKEN=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TOKEN:-}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TIMEOUT=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TIMEOUT:-15}
      - AI_EXPLORE_LIVE_VIEW_INTERNAL_URL_TEMPLATE=${AI_EXPLORE_LIVE_VIEW_INTERNAL_URL_TEMPLATE:-}
      - AI_EXPLORE_LIVE_VIEW_URL_TEMPLATE=${AI_EXPLORE_LIVE_VIEW_URL_TEMPLATE:-}
      - AI_EXPLORE_LIVE_VIEW_RELEASE_URL=${AI_EXPLORE_LIVE_VIEW_RELEASE_URL:-}
      - AI_EXPLORE_LIVE_VIEW_RELEASE_TIMEOUT=${AI_EXPLORE_LIVE_VIEW_RELEASE_TIMEOUT:-6}
      - AI_EXPLORE_BROWSER_HEADLESS=${AI_EXPLORE_BROWSER_HEADLESS:-false}
      - AI_EXPLORE_BROWSER_SLOW_MO=${AI_EXPLORE_BROWSER_SLOW_MO:-0}
    volumes:
      - backend_uploads:/app/uploads
      - backend_reports:/app/reports
    depends_on:
      redis:
        condition: service_healthy
    command: >
      bash -lc "
      Xvfb :99 -screen 0 1366x768x24 -ac +extension RANDR >/tmp/xvfb.log 2>&1 &
      fluxbox >/tmp/fluxbox.log 2>&1 &
      x11vnc -display :99 -rfbport 5900 -forever -shared -nopw >/tmp/x11vnc.log 2>&1 &
      websockify --web=/usr/share/novnc/ 0.0.0.0:6080 localhost:5900 >/tmp/websockify.log 2>&1 &
      exec gunicorn --bind 0.0.0.0:5000 --workers 4 --threads 2 wsgi:app
      "
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fullscopetest_network

  celery:
    build:
      context: .
      dockerfile: docker/Dockerfile.backend
    restart: always
    environment:
      - FLASK_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - CELERY_ENABLE=true
      - CELERY_BROKER_URL=${REDIS_URL}
      - CELERY_RESULT_BACKEND=${REDIS_URL}
      - OSS_ENDPOINT=${OSS_ENDPOINT}
      - OSS_ACCESS_KEY_ID=${OSS_ACCESS_KEY_ID}
      - OSS_ACCESS_KEY_SECRET=${OSS_ACCESS_KEY_SECRET}
      - OSS_BUCKET_NAME=${OSS_BUCKET_NAME}
      - OSS_DOMAIN=${OSS_DOMAIN}
      - AI_ASSISTANT_ENABLED=${AI_ASSISTANT_ENABLED}
      - AI_ASSISTANT_BASE_URL=${AI_ASSISTANT_BASE_URL}
      - AI_ASSISTANT_MODEL=${AI_ASSISTANT_MODEL}
      - AI_ASSISTANT_API_KEY=${AI_ASSISTANT_API_KEY}
      - AI_VISION_BASE_URL=${AI_VISION_BASE_URL}
      - AI_VISION_MODEL=${AI_VISION_MODEL}
      - AI_VISION_API_KEY=${AI_VISION_API_KEY}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_URL=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_URL:-}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TOKEN=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TOKEN:-}
      - AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TIMEOUT=${AI_EXPLORE_LIVE_VIEW_ALLOCATOR_TIMEOUT:-15}
      - AI_EXPLORE_LIVE_VIEW_INTERNAL_URL_TEMPLATE=${AI_EXPLORE_LIVE_VIEW_INTERNAL_URL_TEMPLATE:-}
      - AI_EXPLORE_LIVE_VIEW_URL_TEMPLATE=${AI_EXPLORE_LIVE_VIEW_URL_TEMPLATE:-}
      - AI_EXPLORE_LIVE_VIEW_RELEASE_URL=${AI_EXPLORE_LIVE_VIEW_RELEASE_URL:-}
      - AI_EXPLORE_LIVE_VIEW_RELEASE_TIMEOUT=${AI_EXPLORE_LIVE_VIEW_RELEASE_TIMEOUT:-6}
      - AI_EXPLORE_BROWSER_HEADLESS=${AI_EXPLORE_BROWSER_HEADLESS:-true}
      - AI_EXPLORE_BROWSER_SLOW_MO=${AI_EXPLORE_BROWSER_SLOW_MO:-0}
    volumes:
      - backend_reports:/app/reports
    depends_on:
      - redis
    command: celery -A app.tasks worker --loglevel=warning
    extra_hosts:
      - "host.docker.internal:host-gateway"
    networks:
      - fullscopetest_network

networks:
  fullscopetest_network:
    driver: bridge

volumes:
  redis_data:
  backend_uploads:
  backend_reports:
